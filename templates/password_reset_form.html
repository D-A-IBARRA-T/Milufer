{% extends 'base.html' %}
{% block content %}
<div class="contenedor-login">
  <h1>Recuperar contraseña</h1>
  <p>Ingresa tu correo para enviarte el enlace de recuperación.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Enviar enlace</button>
  </form>
</div>
{% endblock %}
